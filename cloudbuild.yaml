steps:
  - name: "zricethezav/gitleaks"
    id: "Secret Detection - Gitleaks"
    entrypoint: "gitleaks"
    args:
      - "detect"
      - "--source=."
      - "--exit-code=1"
      - "--verbose"
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "Build Frontend Image"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:$SHORT_SHA"
      - "-f"
      - "Dockerfile"
      - "."
    waitFor: ["Secret Detection - Gitleaks"]
    # Container Security Scan
  - name: "ghcr.io/aquasecurity/trivy:latest"
    id: "Container - Scan Frontend Image"
    entrypoint: "trivy"
    args:
      - "image"
      - "--severity=HIGH,CRITICAL"
      - "--exit-code=1"
      - "--format=table"
      - "--timeout=5m"
      - "--no-progress"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:$SHORT_SHA"
    allowFailure: true
  # Push the Docker image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "Push Frontend Image"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:$SHORT_SHA"
    waitFor: ["Build Frontend Image"]
  # Deploy the service to cloudrun (trigger in ai-dev)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "Deploy Frontend Service"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_IMAGE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:$SHORT_SHA"
      - "--project=$PROJECT_ID"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--ingress=internal"
      - "--memory=2Gi"
      - "--cpu=1"
      - "--port=3000"
      - "--add-cloudsql-instances=${_PG_INSTANCE_CONNECTION_NAME}"
      - "--set-env-vars=NEXT_PUBLIC_API_URL=${_API_URL},NEXT_PUBLIC_SESSION_TIMEOUT_MS=${_SESSION_TIMEOUT_MS},SAML_ENTRY_POINT=${_SAML_ENTRY_POINT},SAML_ISSUER=${_SAML_ISSUER},SAML_CALLBACK_URL=${_SAML_CALLBACK_URL},DB_NAME=${_PG_DBNAME},INSTANCE_CONNECTION_NAME=${_PG_INSTANCE_CONNECTION_NAME}"
      - "--update-secrets=JWT_SECRET=NEXTAUTH_SECRET:latest,SAML_CERT=QBRAIN_IDP_CERT:latest,DB_USER=PG_DB_USER:latest,DB_PASSWORD=PG_DB_PASSWORD:latest"
      - "--quiet"
    waitFor: ["Push Frontend Image"]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:$SHORT_SHA"
options:
  logging: CLOUD_LOGGING_ONLY
